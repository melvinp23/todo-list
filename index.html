<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>To-do List</title>
        <link rel="stylesheet" href="styles.css">
        <script src="script.js" defer></script>
    </head>

    <body>
        <div class="container">
            <div class="todo-app">
                <h2>To-do</h2>
                <div class="row">
                    <input type="text" id="input-box" placeholder="Add your text">
                    <button>Add</button>
                </div>
                <ul id="list-container">
                    <li>Task 1</li>
                    <li>Task 2</li>
                    <li>Task 3</li>
                </ul>
            </div>
        </div>

        <footer>
            <a href="https://www.flaticon.com/free-icons/success" title="success icons">Success icons created by
                hqrloveq -
                Flaticon</a>
        </footer>
    </body>

</html>
